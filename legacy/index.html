<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWFL Legacy - Collaborative Groups</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .header h1 {
            color: #1e3c72;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }

        .user-info span {
            color: #555;
            font-weight: 600;
            font-size: 1.1em;
        }

        .btn {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background: #2a5298;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(30, 60, 114, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-success {
            background: #10b981;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-danger {
            background: #ef4444;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .auth-form {
            max-width: 450px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #1e3c72;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .tab {
            flex: 1;
            padding: 14px;
            background: #e0e0e0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab.active {
            background: #1e3c72;
            color: white;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        .hidden {
            display: none;
        }

        .group-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .group-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .group-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .group-card h3 {
            font-size: 1.4em;
            margin-bottom: 10px;
        }

        .group-card p {
            opacity: 0.9;
            margin-bottom: 15px;
            font-size: 0.95em;
        }

        .group-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.3);
            font-size: 0.85em;
        }

        .group-creator {
            font-weight: 600;
        }

        .group-members {
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 35px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h2 {
            color: #1e3c72;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: #333;
        }

        .create-group-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #10b981;
            color: white;
            border: none;
            font-size: 32px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4);
            transition: all 0.3s;
            z-index: 100;
        }

        .create-group-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(16, 185, 129, 0.6);
        }

        .search-bar {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .search-bar:focus {
            outline: none;
            border-color: #1e3c72;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1e3c72;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .member-list {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }

        .member-item {
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .member-item:last-child {
            border-bottom: none;
        }

        .badge {
            display: inline-block;
            background: #1e3c72;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌟 AWFL Legacy</h1>
            <p>Create and collaborate in public groups</p>
            <div class="user-info">
                <span id="userDisplay">Not signed in - View only mode</span>
                <button id="logoutBtn" class="btn btn-secondary hidden">Log Out</button>
            </div>
        </div>

        <!-- Auth Section -->
        <div id="authSection" class="card">
            <div class="tabs">
                <button class="tab active" onclick="showAuthTab('login')">Sign In</button>
                <button class="tab" onclick="showAuthTab('signup')">Create Account</button>
            </div>

            <!-- Login Form -->
            <div id="loginForm" class="auth-form">
                <div class="error-message" id="loginError"></div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter password">
                </div>
                <button class="btn" onclick="handleLogin()" style="width: 100%;">Sign In</button>
            </div>

            <!-- Signup Form -->
            <div id="signupForm" class="auth-form hidden">
                <div class="error-message" id="signupError"></div>
                <div class="success-message" id="signupSuccess"></div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="signupUsername" placeholder="Choose a username (no spaces)">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" placeholder="Choose a password">
                </div>
                <button class="btn" onclick="handleSignup()" style="width: 100%;">Create Account</button>
            </div>
        </div>

        <!-- Groups Section -->
        <div class="card">
            <h2 style="margin-bottom: 20px; color: #333;">Public Groups</h2>
            <input type="text" class="search-bar" id="searchBar" placeholder="🔍 Search groups...">
            
            <div id="groupsContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading groups...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Group Button (only for logged-in users) -->
    <button id="createGroupBtn" class="create-group-btn hidden" onclick="openCreateGroupModal()">+</button>

    <!-- Create Group Modal -->
    <div id="createGroupModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New Group</h2>
                <button class="close-btn" onclick="closeCreateGroupModal()">&times;</button>
            </div>
            <div class="error-message" id="createGroupError"></div>
            <div class="success-message" id="createGroupSuccess"></div>
            
            <div class="form-group">
                <label>Group Name</label>
                <input type="text" id="groupName" placeholder="e.g., The Science Discovery Room">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="groupDescription" placeholder="What is this group about?"></textarea>
            </div>
            <button class="btn btn-success" onclick="createGroup()" style="width: 100%;">Create Group</button>
        </div>
    </div>

    <!-- View Group Modal -->
    <div id="viewGroupModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="viewGroupTitle">Group Name</h2>
                <button class="close-btn" onclick="closeViewGroupModal()">&times;</button>
            </div>
            
            <div id="groupContent">
                <p id="viewGroupDescription" style="color: #666; margin-bottom: 20px;"></p>
                
                <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                    <p><strong>Creator:</strong> <span id="viewGroupCreator"></span></p>
                    <p style="margin-top: 8px;"><strong>Created:</strong> <span id="viewGroupCreated"></span></p>
                </div>

                <div class="member-list">
                    <h3 style="margin-bottom: 15px;">Members <span id="memberCount" class="badge">0</span></h3>
                    <div id="membersList"></div>
                </div>

                <div class="action-buttons">
                    <button id="joinGroupBtn" class="btn btn-success hidden" onclick="joinGroup()">Join Group</button>
                    <button id="leaveGroupBtn" class="btn btn-danger hidden" onclick="leaveGroup()">Leave Group</button>
                    <button id="editGroupBtn" class="btn hidden" onclick="editGroup()">Edit Group</button>
                    <button class="btn btn-secondary" onclick="visitGroupPage()">Visit Group Page</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GH_TOKEN = 'YOUR_GITHUB_TOKEN'; // REPLACE WITH YOUR GITHUB TOKEN
        const GH_OWNER = 'aedtpworldawfl';
        const GH_REPO = 'awflmeta';
        const GH_BRANCH = 'main';
        const ACCOUNTS_URL = 'https://aedtpworldawfl.github.io/awflmeta/accounts/accounts.json';
        const GROUPS_INDEX_URL = 'https://aedtpworldawfl.github.io/awflmeta/legacy/groups/index.json';
        
        let currentUser = null;
        let allGroups = [];
        let currentGroup = null;

        // Initialize
        window.onload = () => {
            checkAuth();
            loadGroups();
            setupSearch();
        };

        // SHA-256 Hash Function
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        // Auth Tab Switching
        function showAuthTab(tab) {
            if (tab === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('signupForm').classList.add('hidden');
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.querySelectorAll('.tab')[1].classList.remove('active');
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('signupForm').classList.remove('hidden');
                document.querySelectorAll('.tab')[0].classList.remove('active');
                document.querySelectorAll('.tab')[1].classList.add('active');
            }
        }

        // Check Authentication
        function checkAuth() {
            const user = localStorage.getItem('awfl_legacy_user');
            if (user) {
                currentUser = JSON.parse(user);
                showAuthenticatedUI();
            }
        }

        // Show UI for authenticated users
        function showAuthenticatedUI() {
            document.getElementById('userDisplay').textContent = `Signed in as: ${currentUser.username}`;
            document.getElementById('logoutBtn').classList.remove('hidden');
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('createGroupBtn').classList.remove('hidden');
        }

        // Handle Signup
        async function handleSignup() {
            const username = document.getElementById('signupUsername').value.trim().replace(/\s+/g, '_');
            const password = document.getElementById('signupPassword').value;
            const errorEl = document.getElementById('signupError');
            const successEl = document.getElementById('signupSuccess');

            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            if (!username || !password) {
                errorEl.textContent = 'Please fill in all fields';
                errorEl.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorEl.textContent = 'Password must be at least 6 characters';
                errorEl.style.display = 'block';
                return;
            }

            try {
                // Fetch existing accounts
                const response = await fetch(ACCOUNTS_URL);
                let accountsData = { users: [] };
                
                if (response.ok) {
                    accountsData = await response.json();
                }

                // Check if username already exists
                if (accountsData.users.find(u => u.username === username)) {
                    errorEl.textContent = 'Username already exists';
                    errorEl.style.display = 'block';
                    return;
                }

                // Hash password
                const passwordHash = await sha256(password);

                // Add new user
                accountsData.users.push({
                    username,
                    passwordHash,
                    createdAt: new Date().toISOString()
                });

                // Update accounts.json
                await updateGitHubFile(
                    'accounts/accounts.json',
                    JSON.stringify(accountsData, null, 2),
                    `Add new user: ${username}`
                );

                successEl.textContent = 'Account created successfully! You can now sign in.';
                successEl.style.display = 'block';
                document.getElementById('signupUsername').value = '';
                document.getElementById('signupPassword').value = '';
                
                setTimeout(() => showAuthTab('login'), 2000);

            } catch (error) {
                errorEl.textContent = 'Error creating account. Please try again.';
                errorEl.style.display = 'block';
                console.error(error);
            }
        }

        // Handle Login
        async function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');

            errorEl.style.display = 'none';

            if (!username || !password) {
                errorEl.textContent = 'Please fill in all fields';
                errorEl.style.display = 'block';
                return;
            }

            try {
                const response = await fetch(ACCOUNTS_URL);
                const accountsData = await response.json();

                const passwordHash = await sha256(password);
                const user = accountsData.users.find(u => 
                    u.username === username && u.passwordHash === passwordHash
                );

                if (user) {
                    currentUser = { username: user.username };
                    localStorage.setItem('awfl_legacy_user', JSON.stringify(currentUser));
                    showAuthenticatedUI();
                    loadGroups(); // Reload to show create/edit options
                } else {
                    errorEl.textContent = 'Invalid username or password';
                    errorEl.style.display = 'block';
                }
            } catch (error) {
                errorEl.textContent = 'Error connecting to server';
                errorEl.style.display = 'block';
                console.error(error);
            }
        }

        // Handle Logout
        document.getElementById('logoutBtn').onclick = () => {
            localStorage.removeItem('awfl_legacy_user');
            currentUser = null;
            document.getElementById('userDisplay').textContent = 'Not signed in - View only mode';
            document.getElementById('logoutBtn').classList.add('hidden');
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('createGroupBtn').classList.add('hidden');
            loadGroups();
        };

        // GitHub API Helper
        async function updateGitHubFile(filePath, content, message) {
            const base64Content = btoa(unescape(encodeURIComponent(content)));

            // Get current file SHA
            let sha = null;
            try {
                const shaResponse = await fetch(
                    `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${filePath}`,
                    {
                        headers: {
                            'Authorization': `Bearer ${GH_TOKEN}`,
                            'Accept': 'application/vnd.github+json'
                        }
                    }
                );
                if (shaResponse.ok) {
                    const shaData = await shaResponse.json();
                    sha = shaData.sha;
                }
            } catch (e) {}

            // Update file
            const response = await fetch(
                `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${filePath}`,
                {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${GH_TOKEN}`,
                        'Accept': 'application/vnd.github+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message,
                        content: base64Content,
                        branch: GH_BRANCH,
                        ...(sha ? { sha } : {})
                    })
                }
            );

            if (!response.ok) {
                throw new Error('GitHub update failed');
            }

            return await response.json();
        }

        // Load Groups
        async function loadGroups() {
            const container = document.getElementById('groupsContainer');
            
            try {
                const response = await fetch(GROUPS_INDEX_URL + '?t=' + Date.now());
                
                if (!response.ok) {
                    allGroups = [];
                    displayGroups([]);
                    return;
                }

                allGroups = await response.json();
                displayGroups(allGroups);

            } catch (error) {
                allGroups = [];
                displayGroups([]);
            }
        }

        // Display Groups
        function displayGroups(groups) {
            const container = document.getElementById('groupsContainer');

            if (groups.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📦</div>
                        <h3>No groups yet</h3>
                        <p>${currentUser ? 'Be the first to create a group!' : 'Sign in to create a group'}</p>
                    </div>
                `;
                return;
            }

            const html = `
                <div class="group-grid">
                    ${groups.map(group => `
                        <div class="group-card" onclick="openGroupModal('${group.slug}')">
                            <h3>${group.name}</h3>
                            <p>${group.description.substring(0, 120)}${group.description.length > 120 ? '...' : ''}</p>
                            <div class="group-meta">
                                <span class="group-creator">👤 ${group.creator}</span>
                                <span class="group-members">👥 ${group.members ? group.members.length : 1}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            container.innerHTML = html;
        }

        // Setup Search
        function setupSearch() {
            document.getElementById('searchBar').addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                const filtered = allGroups.filter(group => 
                    group.name.toLowerCase().includes(query) || 
                    group.description.toLowerCase().includes(query) ||
                    group.creator.toLowerCase().includes(query)
                );
                displayGroups(filtered);
            });
        }

        // Create Group Modal
        function openCreateGroupModal() {
            document.getElementById('createGroupModal').classList.add('active');
            document.getElementById('createGroupError').style.display = 'none';
            document.getElementById('createGroupSuccess').style.display = 'none';
        }

        function closeCreateGroupModal() {
            document.getElementById('createGroupModal').classList.remove('active');
            document.getElementById('groupName').value = '';
            document.getElementById('groupDescription').value = '';
        }

        // Create Group
        async function createGroup() {
            const name = document.getElementById('groupName').value.trim();
            const description = document.getElementById('groupDescription').value.trim();
            const errorEl = document.getElementById('createGroupError');
            const successEl = document.getElementById('createGroupSuccess');

            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            if (!name || !description) {
                errorEl.textContent = 'Please fill in all fields';
                errorEl.style.display = 'block';
                return;
            }

            const slug = name.replace(/\s+/g, '_');

            try {
                // Check if group already exists
                if (allGroups.find(g => g.slug === slug)) {
                    errorEl.textContent = 'A group with this name already exists';
                    errorEl.style.display = 'block';
                    return;
                }

                const groupData = {
                    slug,
                    name,
                    description,
                    creator: currentUser.username,
                    createdAt: new Date().toISOString(),
                    members: [currentUser.username]
                };

                // Create group HTML page
                const groupHTML = createGroupHTML(groupData);
                await updateGitHubFile(
                    `legacy/${slug}.html`,
                    groupHTML,
                    `Create group: ${name}`
                );

                // Update groups index
                allGroups.unshift(groupData);
                await updateGitHubFile(
                    'legacy/groups/index.json',
                    JSON.stringify(allGroups, null, 2),
                    `Add group to index: ${name}`
                );

                successEl.textContent = 'Group created successfully!';
                successEl.style.display = 'block';

                setTimeout(() => {
                    closeCreateGroupModal();
                    loadGroups();
                }, 1500);

            } catch (error) {
                errorEl.textContent = 'Error creating group. Please try again.';
                errorEl.style.display = 'block';
                console.error(error);
            }
        }

        // Create Group HTML Template
        function createGroupHTML(groupData) {
            return `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${groupData.name} - AWFL Legacy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        .header h1 { color: #667eea; margin-bottom: 10px; }
        .header p { color: #666; }
        .meta {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #f0f0f0;
            color: #666;
            font-size: 0.9em;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>${groupData.name}</h1>
            <p>${groupData.description}</p>
            <div class="meta">
                <span>👤 Created by: <strong>${groupData.creator}</strong></span>
                <span>📅 ${new Date(groupData.createdAt).toLocaleDateString()}</span>
            </div>
        </div>

        <div class="card">
            <h2>Welcome to ${groupData.name}!</h2>
            <p style="color: #666; margin-top: 15px;">This is a collaborative space for group members.</p>
            <p style="margin-top: 30px;">
                <a href="../legacy/" class="btn">← Back to All Groups</a>
            </p>
        </div>
    </div>
</body>
</html>`;
        }

        // View Group Modal
        async function openGroupModal(slug) {
            const group = allGroups.find(g => g.slug === slug);
            if (!group) return;

            currentGroup = group;

            document.getElementById('viewGroupTitle').textContent = group.name;
            document.getElementById('viewGroupDescription').textContent = group.description;
            document.getElementById('viewGroupCreator').textContent = group.creator;
            document.getElementById('viewGroupCreated').textContent = new Date(group.createdAt).toLocaleString();

            // Update members list
            const members = group.members || [group.creator];
            document.getElementById('memberCount').textContent = members.length;
            document.getElementById('membersList').innerHTML = members.map(m => `
                <div class="member-item">
                    ${m} ${m === group.creator ? '<span class="badge">Creator</span>' : ''}
                </div>
            `).join('');

            // Show/hide action buttons based on user state
            if (currentUser) {
                const isMember = members.includes(currentUser.username);
                const isCreator = group.creator === currentUser.username;

                document.getElementById('joinGroupBtn').classList.toggle('hidden', isMember);
                document.getElementById('leaveGroupBtn').classList.toggle('hidden', !isMember || isCreator);
                document.getElementById('editGroupBtn').classList.toggle('hidden', !isCreator);
            } else {
                document.getElementById('joinGroupBtn').classList.add('hidden');
                document.getElementById('leaveGroupBtn').classList.add('hidden');
                document.getElementById('editGroupBtn').classList.add('hidden');
            }

            document.getElementById('viewGroupModal').classList.add('active');
        }

        function closeViewGroupModal() {
            document.getElementById('viewGroupModal').classList.remove('active');
            currentGroup = null;
        }

        // Join Group
        async function joinGroup() {
            if (!currentUser || !currentGroup) return;

            try {
                const members = currentGroup.members || [currentGroup.creator];
                if (!members.includes(currentUser.username)) {
                    members.push(currentUser.username);
                }

                const groupIndex = allGroups.findIndex(g => g.slug === currentGroup.slug);
                allGroups[groupIndex].members = members;

                await updateGitHubFile(
                    'legacy/groups/index.json',
                    JSON.stringify(allGroups, null, 2),
                    `${currentUser.username} joined ${currentGroup.name}`
                );

                alert('Successfully joined the group!');
                closeViewGroupModal();
                loadGroups();

            } catch (error) {
                alert('Error joining group');
                console.error(error);
            }
        }

        // Leave Group
        async function leaveGroup() {
            if (!currentUser || !currentGroup) return;

            if (!confirm('Are you sure you want to leave this group?')) return;

            try {
                const members = currentGroup.members || [currentGroup.creator];
                const updatedMembers = members.filter(m => m !== currentUser.username);

                const groupIndex = allGroups.findIndex(g => g.slug === currentGroup.slug);
                allGroups[groupIndex].members = updatedMembers;

                await updateGitHubFile(
                    'legacy/groups/index.json',
                    JSON.stringify(allGroups, null, 2),
                    `${currentUser.username} left ${currentGroup.name}`
                );

                alert('Successfully left the group');
                closeViewGroupModal();
                loadGroups();

            } catch (error) {
                alert('Error leaving group');
                console.error(error);
            }
        }

        // Visit Group Page
        function visitGroupPage() {
            if (!currentGroup) return;
            window.open(`https://aedtpworldawfl.github.io/awflmeta/legacy/${currentGroup.slug}.html`, '_blank');
        }

        // Edit Group (placeholder - you can expand this)
        function editGroup() {
            alert('Edit functionality coming soon!');
        }
    </script>
</body>
</html>
