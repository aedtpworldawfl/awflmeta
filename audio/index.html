

















<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWFL Audio - Upload & Stream</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #f0f0f0;
        }

        .user-info span {
            color: #555;
            font-weight: 500;
        }

        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .auth-form {
            max-width: 400px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            background: #f0f2ff;
            border-color: #5568d3;
        }

        .upload-area.dragover {
            background: #e8ebff;
            border-color: #4c5fd7;
        }

        .upload-area input[type="file"] {
            display: none;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .progress-container {
            margin-top: 20px;
            display: none;
        }

        .progress-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .progress-item .filename {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            word-break: break-all;
        }

        .progress-bar-container {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #10b981 0%, #059669 100%);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
        }

        .progress-bar.failed {
            background: linear-gradient(90deg, #ef4444 0%, #dc2626 100%);
        }

        .audio-list {
            margin-top: 20px;
        }

        .audio-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .audio-item audio {
            flex: 1;
            height: 40px;
        }

        .audio-name {
            font-weight: 600;
            color: #333;
            flex: 1;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        .hidden {
            display: none;
        }

        .upload-again {
            margin-top: 20px;
            text-align: center;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: #e0e0e0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab.active {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 AWFL Audio</h1>
            <div class="user-info">
                <span id="userDisplay">Not signed in</span>
                <button id="logoutBtn" class="btn btn-secondary hidden">Log Out</button>
            </div>
        </div>

        <!-- Auth Section (for non-logged-in users) -->
        <div id="authSection" class="card">
            <div class="tabs">
                <button class="tab active" onclick="showTab('login')">Sign In</button>
                <button class="tab" onclick="showTab('signup')">Create Account</button>
            </div>

            <!-- Login Form -->
            <div id="loginForm" class="auth-form">
                <div class="error-message" id="loginError"></div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter password">
                </div>
                <button class="btn" onclick="handleLogin()" style="width: 100%;">Sign In</button>
            </div>

            <!-- Signup Form -->
            <div id="signupForm" class="auth-form hidden">
                <div class="error-message" id="signupError"></div>
                <div class="success-message" id="signupSuccess"></div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="signupUsername" placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" placeholder="Choose a password">
                </div>
                <button class="btn" onclick="handleSignup()" style="width: 100%;">Create Account</button>
            </div>
        </div>

        <!-- Upload Section (for logged-in users only) -->
        <div id="uploadSection" class="card hidden">
            <h2 style="margin-bottom: 20px; color: #333;">Upload Audio</h2>
            <div class="error-message" id="uploadError"></div>
            
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">🎵</div>
                <h3>Click to upload or drag & drop MP3 files</h3>
                <p style="color: #666; margin-top: 10px;">You can select multiple files at once</p>
                <input type="file" id="fileInput" accept=".mp3,audio/mpeg" multiple>
            </div>

            <div class="progress-container" id="progressContainer"></div>

            <div class="upload-again hidden" id="uploadAgain">
                <button class="btn" onclick="resetUpload()">Upload More Files</button>
            </div>
        </div>

        <!-- Audio List Section (visible to everyone) -->
        <div class="card">
            <h2 style="margin-bottom: 20px; color: #333;">Available Audio</h2>
            <div id="audioList" class="audio-list">
                <p style="color: #666; text-align: center;">Loading audio files...</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://your-render-app.onrender.com'; // REPLACE WITH YOUR RENDER URL
        const ACCOUNTS_URL = 'https://aedtpworldawfl.github.io/awflmeta/accounts/accounts.json';
        const AUDIO_BASE = 'https://aedtpworldawfl.github.io/awflmeta/audio/';
        const GH_TOKEN = 'YOUR_GITHUB_TOKEN'; // REPLACE WITH YOUR GITHUB TOKEN
        const GH_OWNER = 'aedtpworldawfl';
        const GH_REPO = 'awflmeta';

        let currentUser = null;

        // Initialize
        window.onload = () => {
            checkAuth();
            loadAudioList();
            setupUploadArea();
        };

        // Tab switching
        function showTab(tab) {
            if (tab === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('signupForm').classList.add('hidden');
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.querySelectorAll('.tab')[1].classList.remove('active');
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('signupForm').classList.remove('hidden');
                document.querySelectorAll('.tab')[0].classList.remove('active');
                document.querySelectorAll('.tab')[1].classList.add('active');
            }
        }

        // Check if user is logged in
        function checkAuth() {
            const user = localStorage.getItem('awfl_user');
            if (user) {
                currentUser = JSON.parse(user);
                showUploadSection();
            }
        }

        // Show upload section for logged-in users
        function showUploadSection() {
            document.getElementById('userDisplay').textContent = `Signed in as: ${currentUser.username}`;
            document.getElementById('logoutBtn').classList.remove('hidden');
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('uploadSection').classList.remove('hidden');
        }

        // Handle Signup
        async function handleSignup() {
            const username = document.getElementById('signupUsername').value.trim();
            const password = document.getElementById('signupPassword').value;
            const errorEl = document.getElementById('signupError');
            const successEl = document.getElementById('signupSuccess');

            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            if (!username || !password) {
                errorEl.textContent = 'Please fill in all fields';
                errorEl.style.display = 'block';
                return;
            }

            try {
                // Fetch existing accounts
                const response = await fetch(ACCOUNTS_URL);
                let accounts = [];
                
                if (response.ok) {
                    accounts = await response.json();
                }

                // Check if username already exists
                if (accounts.find(acc => acc.username === username)) {
                    errorEl.textContent = 'Username already exists';
                    errorEl.style.display = 'block';
                    return;
                }

                // Add new account
                accounts.push({ username, password });

                // Update accounts.json on GitHub
                const accountsContent = JSON.stringify(accounts, null, 2);
                const base64Content = btoa(unescape(encodeURIComponent(accountsContent)));

                // Get current file SHA (needed for update)
                const shaResponse = await fetch(
                    `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/accounts/accounts.json`,
                    {
                        headers: {
                            'Authorization': `Bearer ${GH_TOKEN}`,
                            'Accept': 'application/vnd.github+json'
                        }
                    }
                );
                
                let sha = null;
                if (shaResponse.ok) {
                    const shaData = await shaResponse.json();
                    sha = shaData.sha;
                }

                // Update file
                const updateResponse = await fetch(
                    `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/accounts/accounts.json`,
                    {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bearer ${GH_TOKEN}`,
                            'Accept': 'application/vnd.github+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Add new user: ${username}`,
                            content: base64Content,
                            branch: 'main',
                            ...(sha ? { sha } : {})
                        })
                    }
                );

                if (updateResponse.ok) {
                    successEl.textContent = 'Account created successfully! You can now sign in.';
                    successEl.style.display = 'block';
                    document.getElementById('signupUsername').value = '';
                    document.getElementById('signupPassword').value = '';
                    
                    setTimeout(() => showTab('login'), 2000);
                } else {
                    throw new Error('Failed to create account');
                }

            } catch (error) {
                errorEl.textContent = 'Error creating account. Please try again.';
                errorEl.style.display = 'block';
                console.error(error);
            }
        }

        // Handle Login
        async function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');

            errorEl.style.display = 'none';

            if (!username || !password) {
                errorEl.textContent = 'Please fill in all fields';
                errorEl.style.display = 'block';
                return;
            }

            try {
                const response = await fetch(ACCOUNTS_URL);
                const accounts = await response.json();

                const user = accounts.find(acc => acc.username === username && acc.password === password);

                if (user) {
                    currentUser = { username };
                    localStorage.setItem('awfl_user', JSON.stringify(currentUser));
                    showUploadSection();
                } else {
                    errorEl.textContent = 'Invalid username or password';
                    errorEl.style.display = 'block';
                }
            } catch (error) {
                errorEl.textContent = 'Error connecting to server';
                errorEl.style.display = 'block';
                console.error(error);
            }
        }

        // Handle Logout
        document.getElementById('logoutBtn').onclick = () => {
            localStorage.removeItem('awfl_user');
            currentUser = null;
            document.getElementById('userDisplay').textContent = 'Not signed in';
            document.getElementById('logoutBtn').classList.add('hidden');
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('uploadSection').classList.add('hidden');
            resetUpload();
        };

        // Setup upload area
        function setupUploadArea() {
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');

            uploadArea.onclick = () => fileInput.click();

            fileInput.onchange = (e) => handleFiles(e.target.files);

            // Drag and drop
            uploadArea.ondragover = (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            };

            uploadArea.ondragleave = () => {
                uploadArea.classList.remove('dragover');
            };

            uploadArea.ondrop = (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                const files = Array.from(e.dataTransfer.files).filter(f => f.type === 'audio/mpeg' || f.name.endsWith('.mp3'));
                handleFiles(files);
            };
        }

        // Handle file upload
        async function handleFiles(files) {
            if (!files || files.length === 0) return;

            const errorEl = document.getElementById('uploadError');
            errorEl.style.display = 'none';

            // Validate files
            const validFiles = Array.from(files).filter(file => {
                if (file.type !== 'audio/mpeg' && !file.name.endsWith('.mp3')) {
                    errorEl.textContent = 'Only MP3 files are allowed';
                    errorEl.style.display = 'block';
                    return false;
                }
                return true;
            });

            if (validFiles.length === 0) return;

            const progressContainer = document.getElementById('progressContainer');
            progressContainer.style.display = 'block';
            progressContainer.innerHTML = '';

            for (const file of validFiles) {
                await uploadFile(file);
            }

            document.getElementById('uploadAgain').classList.remove('hidden');
        }

        // Upload single file
        async function uploadFile(file) {
            // Sanitize filename: replace spaces with underscores
            const sanitizedName = file.name.replace(/\s+/g, '_');
            
            const progressItem = document.createElement('div');
            progressItem.className = 'progress-item';
            progressItem.innerHTML = `
                <div class="filename">${sanitizedName}</div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progress-${Date.now()}">0%</div>
                </div>
            `;
            document.getElementById('progressContainer').appendChild(progressItem);

            const progressBar = progressItem.querySelector('.progress-bar');

            try {
                // Read file as base64
                const base64Content = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => {
                        const base64 = reader.result.split(',')[1];
                        resolve(base64);
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });

                // Simulate progress (since we can't track actual upload progress with GitHub API)
                let progress = 0;
                const progressInterval = setInterval(() => {
                    progress += 10;
                    if (progress <= 90) {
                        progressBar.style.width = progress + '%';
                        progressBar.textContent = progress + '%';
                    }
                }, 200);

                // Upload to GitHub
                const response = await fetch(
                    `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/audio/${sanitizedName}`,
                    {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bearer ${GH_TOKEN}`,
                            'Accept': 'application/vnd.github+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Upload audio: ${sanitizedName}`,
                            content: base64Content,
                            branch: 'main'
                        })
                    }
                );

                clearInterval(progressInterval);

                if (response.ok) {
                    progressBar.style.width = '100%';
                    progressBar.textContent = '100%';
                    setTimeout(() => loadAudioList(), 1000);
                } else {
                    throw new Error('Upload failed');
                }

            } catch (error) {
                progressBar.classList.add('failed');
                progressBar.style.width = '100%';
                progressBar.textContent = 'Failed';
                console.error(error);
            }
        }

        // Reset upload UI
        function resetUpload() {
            document.getElementById('progressContainer').innerHTML = '';
            document.getElementById('progressContainer').style.display = 'none';
            document.getElementById('uploadAgain').classList.add('hidden');
            document.getElementById('fileInput').value = '';
        }

        // Load audio list
        async function loadAudioList() {
            const audioList = document.getElementById('audioList');
            
            try {
                const response = await fetch(
                    `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/audio`,
                    {
                        headers: {
                            'Accept': 'application/vnd.github+json'
                        }
                    }
                );

                if (!response.ok) {
                    audioList.innerHTML = '<p style="color: #666; text-align: center;">No audio files available yet</p>';
                    return;
                }

                const files = await response.json();
                const mp3Files = files.filter(f => f.name.endsWith('.mp3'));

                if (mp3Files.length === 0) {
                    audioList.innerHTML = '<p style="color: #666; text-align: center;">No audio files available yet</p>';
                    return;
                }

                audioList.innerHTML = mp3Files.map(file => `
                    <div class="audio-item">
                        <div class="audio-name">${file.name.replace(/_/g, ' ')}</div>
                        <audio controls src="${AUDIO_BASE}${file.name}"></audio>
                    </div>
                `).join('');

            } catch (error) {
                audioList.innerHTML = '<p style="color: #c33; text-align: center;">Error loading audio files</p>';
                console.error(error);
            }
        }
    </script>
</body>
</html>
