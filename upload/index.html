






<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEDTP WORLD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0a0e27;
            --secondary: #1a2055;
            --accent: #00d9ff;
            --accent-warm: #ff6b6b;
            --accent-gold: #ffd700;
            --text-light: #e0e0e0;
            --text-white: #ffffff;
            --success: #00ff88;
            --border: #00d9ff33;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, #0f1535 100%);
            background-attachment: fixed;
            color: var(--text-light);
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 217, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 107, 107, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 50% 0%, rgba(255, 215, 0, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: bgFloat 15s ease-in-out infinite;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(20px); }
        }

        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        /* Header with Logo */
        .header {
            text-align: center;
            margin: 40px 0 60px 0;
            animation: slideDown 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 3.5em;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-warm) 50%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
            margin-bottom: 12px;
            text-shadow: 0 0 40px rgba(0, 217, 255, 0.3);
            animation: glitch 3s ease-in-out infinite;
            position: relative;
        }

        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }

        .tagline {
            font-size: 1.1em;
            color: var(--accent);
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 8px;
            animation: fadeInUp 1s ease-out 0.2s backwards;
        }

        /* Grid Container */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            flex: 1;
            align-content: start;
            animation: fadeInUp 0.8s ease-out 0.3s backwards;
        }

        @media (min-width: 768px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 24px;
            }
        }

        @media (min-width: 1024px) {
            .grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 28px;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Button Cards */
        .nav-card {
            position: relative;
            height: 200px;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(26, 32, 85, 0.8) 0%, rgba(10, 14, 39, 0.8) 100%);
            border: 1.5px solid var(--border);
            box-shadow: 0 8px 32px rgba(0, 217, 255, 0.1);
        }

        .nav-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 255, 255, 0.2) 50%, 
                transparent 100%);
            transition: left 0.5s;
        }

        .nav-card:hover::before {
            left: 100%;
        }

        .nav-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, rgba(0, 217, 255, 0.2) 0%, transparent 80%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .nav-card:hover::after {
            opacity: 1;
        }

        .nav-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
            box-shadow: 0 16px 48px rgba(0, 217, 255, 0.25),
                        inset 0 0 20px rgba(0, 217, 255, 0.1);
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.15) 0%, rgba(255, 107, 107, 0.1) 100%),
                        linear-gradient(135deg, rgba(26, 32, 85, 0.8) 0%, rgba(10, 14, 39, 0.8) 100%);
        }

        .nav-card:active {
            transform: translateY(-4px);
        }

        .card-content {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 100%;
            padding: 20px;
        }

        .card-icon {
            font-size: 2.5em;
            margin-bottom: 12px;
            display: block;
            transition: transform 0.3s ease;
            animation: iconFloat 3s ease-in-out infinite;
        }

        .nav-card:hover .card-icon {
            transform: scale(1.2) rotateZ(10deg);
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .card-text {
            font-weight: 700;
            font-size: 1.1em;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--accent) 0%, var(--text-white) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: all 0.3s ease;
        }

        .nav-card:hover .card-text {
            background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Stagger animation for cards */
        .nav-card:nth-child(1) { animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s backwards; }
        .nav-card:nth-child(2) { animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s backwards; }
        .nav-card:nth-child(3) { animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.6s backwards; }
        .nav-card:nth-child(4) { animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.7s backwards; }
        .nav-card:nth-child(5) { animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.8s backwards; }
        .nav-card:nth-child(6) { animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.9s backwards; }
        .nav-card:nth-child(7) { animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 1.0s backwards; }
        .nav-card:nth-child(8) { animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 1.1s backwards; }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 60px;
            padding: 30px 0;
            border-top: 1px solid var(--border);
            font-size: 0.9em;
            color: var(--text-light);
            animation: fadeIn 1s ease-out 1.2s backwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .footer p {
            margin: 8px 0;
            letter-spacing: 1px;
        }

        .footer .accent {
            color: var(--accent);
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                margin: 30px 0 40px 0;
            }

            .logo {
                font-size: 2.5em;
            }

            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }

            .nav-card {
                height: 160px;
            }

            .card-icon {
                font-size: 2em;
            }

            .card-text {
                font-size: 0.95em;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }

            .header {
                margin: 20px 0 30px 0;
            }

            .logo {
                font-size: 2em;
            }

            .tagline {
                font-size: 0.9em;
                letter-spacing: 2px;
            }

            .grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .nav-card {
                height: 120px;
            }

            .card-icon {
                font-size: 1.8em;
                margin-bottom: 8px;
            }

            .card-text {
                font-size: 0.9em;
            }
        }

        /* Smooth scroll behavior */
        html {
            scroll-behavior: smooth;
        }

        /* Selection styling */
        ::selection {
            background: var(--accent);
            color: var(--primary);
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-warm);
        }
    </style>
</head>
